# Merge this branch into main to run the repair automatically.
name: Apply Playback Source Fix

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-playback-source-fix.yml

permissions:
  contents: write

env:
  PLUGIN_VERSION: "0.26.15.3"
  TARGET_ABI: "10.11.6.0"
  PACKAGE_NAME: "gelato_0.26.15.3.zip"

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4

      - name: Fix Gelato virtual source selection and bump version
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          provider = Path('Decorators/MediaSourceManagerDecorator.cs')
          text = provider.read_text(encoding='utf-8')

          old = '''        sources.AddRange(gelatoSources);

        if (sources.Count > 1)
        {
            // remove primary from list when there are streams
            sources = sources
                .Where(k =>
                    !(k.Path?.StartsWith("gelato", StringComparison.OrdinalIgnoreCase) ?? false)
                )
                .Where(k =>
                    !(k.Path?.StartsWith("stremio", StringComparison.OrdinalIgnoreCase) ?? false)
                )
                .ToList();
        }
'''

          new = '''        sources.AddRange(gelatoSources);

        if (item.IsGelato() && gelatoSources.Count > 0)
        {
            // Gelato library items use a temporary .strm file only as a database placeholder.
            // Never offer that placeholder to Jellyfin for playback when real addon streams exist.
            sources = gelatoSources;
        }
        else if (sources.Count > 1)
        {
            // Remove legacy virtual sources while retaining genuine local sources in mixed mode.
            sources = sources
                .Where(k =>
                    !(k.Path?.StartsWith("gelato", StringComparison.OrdinalIgnoreCase) ?? false)
                )
                .Where(k =>
                    !(k.Path?.StartsWith("stremio", StringComparison.OrdinalIgnoreCase) ?? false)
                )
                .ToList();
        }
'''

          if old not in text:
              raise SystemExit('Expected media-source block was not found')

          provider.write_text(text.replace(old, new, 1), encoding='utf-8')

          replacements = {
              Path('build.yaml'): [('version: "0.26.15.2"', 'version: "0.26.15.3"')],
              Path('Gelato.csproj'): [('<Version>0.26.15.2</Version>', '<Version>0.26.15.3</Version>')],
              Path('.github/workflows/build-test-plugin.yml'): [
                  ('PLUGIN_VERSION: "0.26.15.2"', 'PLUGIN_VERSION: "0.26.15.3"'),
                  ('PACKAGE_NAME: "gelato_0.26.15.2.zip"', 'PACKAGE_NAME: "gelato_0.26.15.3.zip"'),
                  ('Gelato-Universal-0.26.15.2', 'Gelato-Universal-0.26.15.3'),
                  ('publish/gelato_0.26.15.2.zip', 'publish/gelato_0.26.15.3.zip'),
              ],
          }

          for path, pairs in replacements.items():
              value = path.read_text(encoding='utf-8')
              for before, after in pairs:
                  if before not in value:
                      raise SystemExit(f'Expected version string not found in {path}: {before}')
                  value = value.replace(before, after)
              path.write_text(value, encoding='utf-8')
          PY

          rm .github/workflows/apply-playback-source-fix.yml

      - name: Commit playback fix
        shell: bash
        run: |
          git config user.name "Gelato Universal Automation"
          git config user.email "actions@users.noreply.github.com"
          git add Decorators/MediaSourceManagerDecorator.cs build.yaml Gelato.csproj .github/workflows/build-test-plugin.yml .github/workflows/apply-playback-source-fix.yml
          git commit -m "Fix virtual strm source selected for playback"
          git push origin main

      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore and build fixed plugin
        run: |
          dotnet restore Gelato.csproj
          dotnet build Gelato.csproj --configuration Release --no-restore

      - name: Package fixed plugin and repository feed
        shell: bash
        run: |
          set -euo pipefail

          OUT="bin/Release/net9.0"
          STAGE="package/Gelato"
          PUBLISH="publish"

          mkdir -p "$STAGE" "$PUBLISH"
          cp "$OUT/Gelato.dll" "$STAGE/"
          cp "$OUT/Mono.Nat.dll" "$STAGE/"
          cp "$OUT/MonoTorrent"*.dll "$STAGE/"
          cp "$OUT/ReusableTasks.dll" "$STAGE/"

          (
            cd "$STAGE"
            zip -r "../../$PUBLISH/$PACKAGE_NAME" .
          )

          CHECKSUM=$(md5sum "$PUBLISH/$PACKAGE_NAME" | awk '{print $1}')
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          python3 - "$CHECKSUM" "$TIMESTAMP" <<'PY'
          import json
          import os
          import sys

          checksum, timestamp = sys.argv[1], sys.argv[2]
          version = os.environ['PLUGIN_VERSION']
          target_abi = os.environ['TARGET_ABI']
          package_name = os.environ['PACKAGE_NAME']

          repository = [
              {
                  'category': 'General',
                  'description': 'Jellyfin integration for multiple standard Stremio addons.',
                  'guid': '94EA4E14-8163-4989-96FE-0A2094BC2D6A',
                  'name': 'Gelato Universal',
                  'overview': 'Use standard Stremio addons directly in Jellyfin.',
                  'owner': 'Ibbolufc',
                  'versions': [
                      {
                          'changelog': 'Fix playback selecting the virtual .strm placeholder instead of the real addon stream.',
                          'checksum': checksum,
                          'sourceUrl': f'https://raw.githubusercontent.com/Ibbolufc/Gelato/gh-pages/{package_name}',
                          'targetAbi': target_abi,
                          'timestamp': timestamp,
                          'version': version,
                      }
                  ],
              }
          ]

          with open('publish/repository.json', 'w', encoding='utf-8') as handle:
              json.dump(repository, handle, indent=2)
              handle.write('\n')
          PY

      - name: Upload fixed plugin ZIP
        uses: actions/upload-artifact@v4
        with:
          name: Gelato-Universal-0.26.15.3
          path: publish/gelato_0.26.15.3.zip
          if-no-files-found: error
          retention-days: 30

      - name: Publish fixed Jellyfin repository
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./publish
          force_orphan: true
